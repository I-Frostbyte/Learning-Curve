syntax = "proto3";

package service;

option go_package = "github.com/I-Frostbyte/Learning-Curve/gRPC/grpc-in-go/protobufs/service";

service UserService {
    rpc GetUser (UserRequest) returns (UserResponse);
}

message UserRequest {
    string id = 1;
}

message UserResponse {
    string id = 1;
    string name = 2;
    int32 age = 3;
}